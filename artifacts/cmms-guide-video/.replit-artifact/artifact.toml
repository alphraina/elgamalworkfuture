kind = "video"
previewPath = "/cmms-guide-video/"
title = "CMMS Animated Tutorial Video"
version = "1.0.0"
id = "artifacts/cmms-guide-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/cmms-guide-video/" ]
localPort = 20961

[services.development]
run = "pnpm --filter @workspace/cmms-guide-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cmms-guide-video", "run", "build" ]
publicDir = "artifacts/cmms-guide-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20961"
BASE_PATH = "/cmms-guide-video/"

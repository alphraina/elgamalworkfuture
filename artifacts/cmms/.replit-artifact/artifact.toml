kind = "web"
previewPath = "/"
title = "OPPO Factory CMMS"
version = "1.0.0"
id = "artifacts/cmms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23697

[services.development]
run = "pnpm --filter @workspace/cmms run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cmms", "run", "build" ]
publicDir = "artifacts/cmms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23697"
BASE_PATH = "/"

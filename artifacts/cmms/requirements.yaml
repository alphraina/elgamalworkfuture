  "date-fns": "For human-readable date formatting across all data tables"
  "framer-motion": "For page transitions, modal animations, and industrial UI effects"
  "lucide-react": "For UI icons across the application"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility function to efficiently merge Tailwind CSS classes"


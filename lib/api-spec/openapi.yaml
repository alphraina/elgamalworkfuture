components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required:
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, manager, maintenance, inventory]
        department:
          type: string
        phone:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - username
        - fullName
        - role
        - isActive

    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        fullName:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, manager, maintenance, inventory]
        department:
          type: string
        phone:
          type: string
      required:
        - username
        - password
        - fullName
        - role

    UpdateUserRequest:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, manager, maintenance, inventory]
        department:
          type: string
        phone:
          type: string
        isActive:
          type: boolean
        password:
          type: string

    DowntimeRecord:
      type: object
      properties:
        id:
          type: integer
        machineName:
          type: string
        lineId:
          type: integer
        lineName:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        durationMinutes:
          type: integer
        reason:
          type: string
        category:
          type: string
          enum: [mechanical, electrical, software, material, other]
        recordedById:
          type: integer
        recordedByName:
          type: string
        status:
          type: string
          enum: [ongoing, resolved]
        notes:
          type: string
        createdAt:
          type: string
      required:
        - id
        - machineName
        - lineId
        - startTime
        - reason
        - category
        - recordedById
        - status

    CreateDowntimeRequest:
      type: object
      properties:
        machineName:
          type: string
        lineId:
          type: integer
        startTime:
          type: string
        reason:
          type: string
        category:
          type: string
          enum: [mechanical, electrical, software, material, other]
        notes:
          type: string
      required:
        - machineName
        - lineId
        - startTime
        - reason
        - category

    UpdateDowntimeRequest:
      type: object
      properties:
        endTime:
          type: string
        status:
          type: string
          enum: [ongoing, resolved]
        notes:
          type: string
        reason:
          type: string

    InventoryItem:
      type: object
      properties:
        id:
          type: integer
        partNumber:
          type: string
        partName:
          type: string
        category:
          type: string
        description:
          type: string
        quantity:
          type: integer
        minQuantity:
          type: integer
        unit:
          type: string
        location:
          type: string
        supplier:

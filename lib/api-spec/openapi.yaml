openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: OPPO Factory CMMS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: downtime
    description: Downtime records
  - name: inventory
    description: Inventory and spare parts
  - name: sparepart-orders
    description: Spare part orders
  - name: preventive-maintenance
    description: Preventive maintenance plans
  - name: training
    description: Training plans
  - name: production
    description: Production capacity
  - name: tasks
    description: Tasks and notifications
  - name: line-plans
    description: Daily line plans
  - name: attendance
    description: Attendance records
  - name: broken-machines
    description: Broken machine records

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
